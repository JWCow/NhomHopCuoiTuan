    <body>
        <button class="language-toggle" id="langBtn"></button>
        <div class="container">
            <h1 class="title" id="appTitle"></h1>

            <div class="form-group">
                <label id="dateLabel"></label>
                <input type="date" id="date" required onblur="this.blur()" onfocus="this.showPicker()">
            </div>

            <div class="form-group">
                <label id="openingSongLabel"></label>
                <div class="congregation-input">
                    <select id="songSelect">
                    </select>
                    <input type="text" id="songCustom" style="display: none">
                </div>
                <input type="hidden" id="songNumber">
            </div>

            <div class="form-group">
                <label id="outlineNumLabel"></label>
                <div class="congregation-input">
                    <select id="outlineSelect">
                    </select>
                    <input type="text" id="outlineCustom" style="display: none">
                </div>
                <input type="hidden" id="outlineNumber">
            </div>

            <div class="form-group">
                <label id="talkTitleLabel"></label>
                <input type="text" id="talkTitle" required>
            </div>

            <div class="form-group">
                <label id="speakerLabel"></label>
                <input type="text" id="speaker" required>
            </div>

            <div class="form-group">
                <label id="congregationLabel"></label>
                <div class="congregation-input">
                    <select id="congregationSelect">
                    </select>
                    <input type="text" id="congregation" style="display: none" required>
                </div>
            </div>

            <div class="form-group">
                <label id="prayerLabel"></label>
                <select id="prayerConfirm">
                    <option value="Có">Có</option>
                    <option value="Không">Không</option>
                </select>
            </div>

            <div class="form-group">
                <label id="imagesLabel"></label>
                <select id="imagesConfirm">
                    <option value="Không">Không</option>
                    <option value="Có">Có</option>
                </select>
            </div>

            <div class="form-group">
                <label id="nextOutlineNumLabel"></label>
                <div class="congregation-input">
                    <select id="nextOutlineSelect">
                    </select>
                    <input type="text" id="nextOutlineCustom" style="display: none">
                </div>
                <input type="hidden" id="nextOutlineNumber">
            </div>

            <div class="form-group">
                <label id="nextTalkTitleLabel"></label>
                <input type="text" id="nextTalkTitle">
            </div>

            <button id="generateBtn"></button>
            <button id="copyBtn"></button>

            <div class="preview" id="preview"></div>
        </div>

        <script src="script.js"></script>
    </body>
